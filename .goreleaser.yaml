version: 2

project_name: portspy

before:
  hooks:
    - go mod tidy

builds:
  - id: portspy
    main: ./cmd/portspy
    binary: portspy
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/agenticraptor/portspy/internal/buildinfo.Version={{.Version}}
      - -X github.com/agenticraptor/portspy/internal/buildinfo.Commit={{.ShortCommit}}
      - -X github.com/agenticraptor/portspy/internal/buildinfo.Date={{.Date}}

archives:
  - id: default
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+\))??!?:.+$'
      order: 0
    - title: Bug fixes
      regexp: '^.*?fix(\(.+\))??!?:.+$'
      order: 1
    - title: Others
      order: 999
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "merge conflict"
      - Merge pull request
      - Merge branch

# Homebrew publishing is disabled by default so the first release succeeds
# without extra setup. To enable `brew install agenticraptor/tap/portspy`:
#   1. Create a public repo: github.com/agenticraptor/homebrew-tap
#   2. Add a HOMEBREW_TAP_GITHUB_TOKEN secret (a PAT with `repo` scope)
#   3. Uncomment the line in .github/workflows/release.yml and the block below
# brews:
#   - name: portspy
#     repository:
#       owner: agenticraptor
#       name: homebrew-tap
#     homepage: "https://github.com/agenticraptor/portspy"
#     description: "See and kill whatever's hogging your local ports — project-aware, in one key."
#     license: "MIT"
#     test: |
#       system "#{bin}/portspy version"
#     commit_author:
#       name: goreleaser-bot
#       email: bot@portspy.dev

release:
  github:
    owner: agenticraptor
    name: portspy
  prerelease: auto
  draft: false
