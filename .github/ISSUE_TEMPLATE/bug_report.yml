name: Bug report
description: Report a problem with portspy
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for filing a bug! Please fill out the details below so we can reproduce it.
  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `portspy version`
      placeholder: portspy 0.1.0 (commit abc1234, built ...)
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Windows
        - Other
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, including the exact command you ran.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: doctor
    attributes:
      label: Output of `portspy doctor`
      description: This helps us understand platform support and permissions on your machine.
      render: shell
